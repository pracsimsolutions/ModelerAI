[product]
name           = "ModelerAI"
display_name   = "PracSim ModelerAI"
description    = "AI assistant that lives inside FlexSim. Chat in plain English about your model; reads model state, edits with permission, and shares chat sessions over Cloudflare Tunnel for cross-network demos."
url            = "https://github.com/pracsimsolutions/ModelerAI"

[wix]
# FIXED FOREVER. Ported from the pre-MIT-cleanup bundle. Changing either
# GUID breaks MSI upgrade behaviour for users on prior installs.
upgrade_code         = "0247D13E-9A35-40A0-80DF-BAD224809F49"
# The reserved tail sets how many files this module can ship: width =
# 12 - (chars after the last '-'). Six zeros -> 6 index digits -> up to
# 999,999 components. ModelerAI's KNOWLEDGE/ pushes the file count past
# the old 3-digit (999) limit, which produced illegal 13-digit GUIDs.
# Trailing zeros mean GUIDs for index <= 999 are unchanged from the
# old 9-zero prefix, so MSI upgrade behaviour is preserved.
component_guid_prefix = "EF04C8EF-BC82-468D-9766-000000"

[brand]
icon_svg     = "modelerai.svg"
banner_svg   = "installer/modelerai-banner.svg"
dialog_svg   = "installer/modelerai-dialog.svg"
toolbox_png  = "bitmaps/modelerai.png"

[flexsim]
default_version_dir = "FlexSim 2026"

[payload]
# APPEND ONLY. Each entry maps to one WiX <Component>.
files = [
    "ModelerAI.t",
    "ModelerAI.fsx",
    "ModelerAI.dll",
    "LICENSE.txt",
    "README.md",
]
# Recursively included. KNOWLEDGE/ holds the hand-written agent KB
# (schemas + topics); webview/index.html is read at runtime by the
# remote HTTP server (asset_loader.cpp). share/ contains the
# Cloudflare Tunnel templates + walkthrough; tools/ ships embed.js
# and build-kb.js so users can regenerate the KB / re-embed the
# viewer after editing.
subdirs = ["KNOWLEDGE", "webview", "share", "tools"]
